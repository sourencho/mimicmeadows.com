<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Press Kit — Mimic Meadows</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    @font-face {
      font-family: 'Corset';
      src: url('Corset.ttf') format('truetype');
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #141f16;
      color: #f0ede6;
      font-family: 'Corset', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    p {
      font-size: 32px;
      color: #7a7a6e;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <p>todo</p>
</body>
</html>
