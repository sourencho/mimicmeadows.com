<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support — Mimic Meadows</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    @font-face {
      font-family: 'Corset';
      src: url('Corset.ttf') format('truetype');
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0b1910;
      color: #f0ede6;
      font-family: 'Corset', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .container {
      padding: 48px 32px;
      max-width: 480px;
      width: 100%;
    }

    h1 {
      font-size: 48px;
      letter-spacing: 0.05em;
      margin-bottom: 40px;
    }

    h2 {
      font-size: 28px;
      color: #c8c4bc;
      letter-spacing: 0.05em;
      margin-bottom: 24px;
    }

    p {
      font-size: 24px;
      color: #7a7a6e;
      letter-spacing: 0.05em;
    }

    .back {
      position: fixed;
      top: 24px;
      left: 24px;
      color: #c68556;
      font-family: 'Corset', Georgia, serif;
      font-size: 24px;
      letter-spacing: 0.05em;
      text-decoration: none;
    }

    .back:hover {
      color: #d4a070;
    }

    .corner-img {
      position: fixed;
      bottom: 10px;
      width: 80px;
      pointer-events: none;
    }

    .corner-img.left {
      left: 10px;
    }

    .corner-img.right {
      right: 10px;
    }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <div class="container">
    <h1>Support</h1>
    <h2>FAQ</h2>
    <p>
      todo
    </p>
    <br>
    <br>
    <h2>Contact</h2>
    <p>
      threethreethreegames@gmail.com<br>
      <br>
      +1 (929) 335-4051<br>
      Brooklyn, NY
    </p>
  </div>
  <img class="corner-img left" src="bottom_left.png" alt="" />
  <img class="corner-img right" src="bottom_right.png" alt="" />
</body>
</html>
